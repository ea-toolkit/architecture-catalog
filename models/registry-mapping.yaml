    bg: "#eff6ff"
    icon: A
  technology:
    name: Technology
    color: "#10b981"
    bg: "#ecfdf5"
    icon: T

# ─────────────────────────────────────────────────────────────
# Relationship Types — verbs for outgoing / incoming edges
# These names are used as the `type` value in element relationships.
# ArchiMate-inspired defaults are provided; rename freely.
# ─────────────────────────────────────────────────────────────
relationship_types:
  composition:
    outgoing: Composes
    incoming: Part of
    icon: "◇"
  aggregation:
    outgoing: Owns
    incoming: Owned by
    icon: "◆"
  realization:
    outgoing: Realizes
    incoming: Realized by
    icon: "▲"
  serving:
    outgoing: Serves
    incoming: Served by
    icon: "→"
  assignment:
    outgoing: Assigned to
    incoming: Assigned from
    icon: "⊕"
  access:
    outgoing: Accesses
    incoming: Accessed by
    icon: "⊙"

