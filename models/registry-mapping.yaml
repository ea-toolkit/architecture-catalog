# ═══════════════════════════════════════════════════════════════
# Registry Mapping — the wiring manifest
# ═══════════════════════════════════════════════════════════════
#
# PURPOSE:
#   Maps your architecture model (conceptual) to the registry-v2
#   folder structure (physical). This file is the single contract
#   consumed by:
#     1. registry-loader.ts   — builds the in-memory graph for FE
#     2. validate.py          — lints consistency & maturity scoring
#     3. SaaS data pipelines  — know which .md files to write
#
# DESIGN PRINCIPLES:
#   - Schema-driven: UI never hard-codes element types or field names
#   - Vocabulary-agnostic: works with any architecture framework
#     (ArchiMate, TOGAF, C4, custom). Name your layers, elements,
#     and relationships however you want — the UI adapts automatically.
#   - Graceful degradation: every field & relationship is optional
#   - Extensible: add a new element = add one entry here, zero code
#
# HOW TO READ:
#   element_key:
#     label         — human-friendly name for UI
#     layer         — which layer it sits in (you define layers below)
#     folder        — relative path under registry-v2/
#     id_field      — which frontmatter field is the file's identity
#     archimate     — (optional) ArchiMate 3.x type, for reference only
#     graph_rank    — left-to-right position (0 = anchor, higher = right)
#     icon          — short emoji/icon for compact rendering
#     fields        — every frontmatter key the FE should look for
#       key:
#         type      — string | string[] | number | boolean | object[]
#         required  — true if absence should trigger a lint warning
#         label     — human label shown in detail panels
#     relationships — arrows going OUT of this element
#       key:          (frontmatter field name)
#         target      — element_key this points to
#         type        — relationship type (e.g., composition, realization)
#         cardinality — one | many
#         resolve_by  — slug | name | abbreviation (how to match target)
#         inverse     — field name on the target type that points back
#         required    — false = orphan is allowed, true = lint error
#
# ═══════════════════════════════════════════════════════════════

version: "1.0"
registry_root: registry-v2

# ─────────────────────────────────────────────────────────────
# Site Branding — change these for white-label deployment
# ─────────────────────────────────────────────────────────────
site:
