# ═══════════════════════════════════════════════════════════════
# Relationship Type Reference
# ═══════════════════════════════════════════════════════════════
# Quick lookup: relationship type → visual semantics for rendering
# These are ArchiMate-inspired defaults. You can rename, add, or
# remove types freely — the UI reads them from this file.
#
# type          │ arrow    │ direction │ layout │ notes
# ──────────────┼──────────┼───────────┼────────┼─────────────────────
# composition   │ ◆ filled │ parent→child │ yes │ structural containment
# aggregation   │ ◇ open   │ whole→part   │ yes │ grouping, ownership
# realization   │ ⇢ dashed │ impl→abstract│ yes │ direction reversed in layout
# serving       │ → solid  │ provider→consumer│ no│ API exposure, consumption
# assignment    │ → solid  │ active→passive │ yes│ infra assignment
# access        │ → dotted │ component→data │ no│ data read/write
# flow          │ → solid  │ from→to   │ no   │ data/event flow
# association   │ — line   │ bidirectional│ no  │ loose coupling
# ═══════════════════════════════════════════════════════════════

# ═══════════════════════════════════════════════════════════════
# Reference Resolution Strategies
# ═══════════════════════════════════════════════════════════════
#
# resolve_by: slug
#   Match the target's .md filename (without .md extension).
#   e.g., "billing-worker" → software-subsystems/billing-worker.md
#
# resolve_by: name
#   Match the target's `name:` frontmatter field (case-insensitive).
#   e.g., "Tenant Management" → components/tenant-management.md
#
# resolve_by: abbreviation
#   Match the target's `abbreviation:` frontmatter field.
#   e.g., "NOVA" → software-systems/platform-core.md (abbreviation: NOVA)
#
# When a reference can't be resolved:
#   - Loader returns { resolved: false, raw: "the-value" }
#   - Renderer shows the node with a ⚠️ broken-link indicator
#   - Linter flags it as a warning (not an error)
# ═══════════════════════════════════════════════════════════════
